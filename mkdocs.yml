site_name: swgoh_comlink
site_description: Python interfaces for swgoh-comlink and built-in StatCalc
repo_name: comlink-python

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - "\U0001F3E0 Home": index.md
  - "\U0001F4D6 Guides":
      - "\U0001F500 Migration Guide": migration.md
      - "\U0001F4DD Logging": logging.md
  - "\U0001F4E1 API":
      - "\U0001F517 SwgohComlink": api/comlink.md
      - "\u26A1 SwgohComlinkAsync": api/async.md
      - "\U0001F4CA StatCalc": api/statcalc.md
      - "\U0001F9F0 Helpers": api/helpers.md
      - "\u26A0\uFE0F Exceptions": api/exceptions.md

extra:
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            docstring_options:
              warn_unknown_params: false
            show_source: false
            members_order: source

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
