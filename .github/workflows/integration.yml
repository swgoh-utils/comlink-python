name: Integration Tests

on:
  pull_request:
    branches: [main, 1.0-maintenance]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      comlink:
        image: ghcr.io/swgoh-utils/swgoh-comlink:latest
        env:
          APP_NAME: comlink-python-integration-tests
        ports:
          - 3000:3000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 -O /dev/null http://localhost:3000/readyz || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 15s

      comlink-hmac:
        image: ghcr.io/swgoh-utils/swgoh-comlink:latest
        env:
          APP_NAME: comlink-python-hmac-integration-tests
          ACCESS_KEY: ${{ secrets.COMLINK_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.COMLINK_SECRET_KEY }}
        ports:
          - 3001:3000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 -O /dev/null http://localhost:3000/readyz || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group test

      - name: Run integration tests
        env:
          RUN_INTEGRATION_TESTS: "1"
          HMAC_ACCESS_KEY: ${{ secrets.COMLINK_ACCESS_KEY }}
          HMAC_SECRET_KEY: ${{ secrets.COMLINK_SECRET_KEY }}
        run: uv run python -m pytest tests/integration/ -v
