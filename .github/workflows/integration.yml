name: Integration Tests

on:
  pull_request:
    branches: [main, 1.0-maintenance]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      comlink:
        image: ghcr.io/swgoh-utils/swgoh-comlink:latest
        env:
          APP_NAME: comlink-python-integration-tests
        ports:
          - 3000:3000
        options: >-
          --health-cmd "/swgoh-comlink --check"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

      comlink-hmac:
        image: ghcr.io/swgoh-utils/swgoh-comlink:latest
        env:
          APP_NAME: comlink-python-hmac-integration-tests
          ACCESS_KEY: test_public_key
          SECRET_KEY: test_secret_key
        ports:
          - 3001:3000
        options: >-
          --health-cmd "/swgoh-comlink --check"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group test

      - name: Run integration tests
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: uv run python -m pytest tests/integration/ -v
