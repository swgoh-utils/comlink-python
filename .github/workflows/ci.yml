name: CI

on:
  pull_request:
    branches: [main, 2.0-development]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Ruff linter
        run: uvx ruff check src/ tests/

      - name: Run Ruff formatter check
        # NOTE: Set continue-on-error to false once the initial formatting PR is merged
        continue-on-error: true
        run: uvx ruff format --check src/ tests/

  # ── Type check ─────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e "." mypy

      - name: Run mypy
        # NOTE: 38 existing errors (mostly implicit Optional). Set continue-on-error
        # to false once type annotations are cleaned up (see pyproject.toml TODO).
        continue-on-error: true
        run: mypy src/swgoh_comlink/

  # ── Test ───────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e "." pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=swgoh_comlink \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  # ── Docs build ────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e "." mkdocs-material "mkdocstrings[python]>=0.28.0"

      - name: Build docs
        run: mkdocs build --strict

  # ── Build verification ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hatch
        run: uv pip install --system hatch

      - name: Build package
        run: hatch build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "from swgoh_comlink import SwgohComlink; print('Import OK')"
